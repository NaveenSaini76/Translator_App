<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Translator 🌍</title>

    <!-- Google Fonts — Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />

    <!-- Custom CSS -->
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet" />
</head>
<body>

<!-- ===================== RGB Animated Background ===================== -->
<div class="rgb-bg"></div>

<!-- ===================== Main Container ============================== -->
<div class="container py-4 position-relative" style="z-index:1;">

    <!-- ────────── Header ────────── -->
    <header class="text-center mb-4">
        <h1 class="neon-title">AI Translator 🌍</h1>
        <p class="subtitle">Translate text instantly into 100 + languages — no API key needed</p>
    </header>

    <!-- ────────── Translator Card ────────── -->
    <div class="glass-card mx-auto" style="max-width:900px;">

        <!-- Language selectors -->
        <div class="row g-3 mb-3">
            <div class="col-md-5">
                <label class="form-label fw-semibold"><i class="bi bi-globe2"></i> Source Language</label>
                <select id="sourceLang" class="form-select glass-select">
                    <option value="auto" selected>🔍 Auto Detect</option>
                    {% for lang in languages %}
                    <option value="{{ lang.code }}">{{ lang.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Swap button -->
            <div class="col-md-2 d-flex align-items-end justify-content-center">
                <button id="swapBtn" class="btn btn-outline-light swap-btn" title="Swap languages">
                    <i class="bi bi-arrow-left-right"></i>
                </button>
            </div>

            <div class="col-md-5">
                <label class="form-label fw-semibold"><i class="bi bi-translate"></i> Target Language</label>
                <select id="targetLang" class="form-select glass-select">
                    {% for lang in languages %}
                    <option value="{{ lang.code }}" {% if lang.code == 'es' %}selected{% endif %}>{{ lang.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <!-- Text areas -->
        <div class="row g-3 mb-3">
            <!-- Source text -->
            <div class="col-md-6">
                <div class="position-relative">
                    <textarea id="sourceText" class="form-control glass-textarea" rows="6"
                        placeholder="Type or paste text here…"></textarea>
                    <button id="clearBtn" class="btn btn-sm btn-outline-secondary clear-btn" title="Clear">
                        <i class="bi bi-x-lg"></i>
                    </button>
                    <span id="charCount" class="char-count">0 / 5000</span>
                </div>
            </div>

            <!-- Translated text -->
            <div class="col-md-6">
                <div class="position-relative">
                    <textarea id="translatedText" class="form-control glass-textarea" rows="6"
                        placeholder="Translation will appear here…" readonly></textarea>

                    <!-- Action buttons on translated box -->
                    <div class="result-actions">
                        <button id="copyBtn" class="btn btn-sm btn-outline-light" title="Copy"><i class="bi bi-clipboard"></i></button>
                        <button id="speakBtn" class="btn btn-sm btn-outline-light" title="Listen"><i class="bi bi-volume-up"></i></button>
                        <button id="downloadBtn" class="btn btn-sm btn-outline-light" title="Download"><i class="bi bi-download"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Detected language badge -->
        <div id="detectedBadge" class="text-center mb-3" style="display:none;">
            <span class="badge glass-badge"><i class="bi bi-cpu"></i> Detected: <strong id="detectedLang"></strong></span>
        </div>

        <!-- Translate button -->
        <div class="text-center">
            <button id="translateBtn" class="btn rgb-glow-btn px-5 py-2">
                <span id="btnText"><i class="bi bi-translate"></i> Translate</span>
                <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
            </button>
        </div>
    </div>

    <!-- ────────── History Section ────────── -->
    <div class="glass-card mx-auto mt-4" style="max-width:900px;">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0"><i class="bi bi-clock-history"></i> Translation History</h5>
            <button id="clearHistoryBtn" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash3"></i> Clear</button>
        </div>
        <div id="historyList" class="history-list">
            <p class="text-muted text-center">No translations yet.</p>
        </div>
    </div>

    <!-- Footer -->
    <footer class="text-center mt-4 text-muted small">
        Created by Naveen Saini
    </footer>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- Custom JS -->
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
